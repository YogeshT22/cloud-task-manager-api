name: Code Quality Checks

# Trigger on every push and pull request
on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  lint-and-validate:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.10"]

    steps:
      # Step 1: Checkout code
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Set up Python
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      # Step 3: Install dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8 black pylint isort

      # Step 4: Check code formatting with Black
      - name: Check code formatting with Black
        run: black --check app/ --line-length 100
        continue-on-error: true

      # Step 5: Lint with Flake8
      - name: Lint with Flake8
        run: |
          flake8 app/ --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 app/ --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
        continue-on-error: true

      # Step 6: Check imports with isort
      - name: Check import sorting with isort
        run: |
          isort app/ --check-only --diff
        continue-on-error: true

      # Step 7: Summary
      - name: Summary
        run: |
          echo "✅ Code quality checks completed"
          echo "Tools: Black (formatter), Flake8 (linter), isort (imports)"
          echo "Status: Warnings allowed (this is a local project)"
